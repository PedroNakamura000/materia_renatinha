<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário de Cadastro</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background:#f4f4f4;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        padding:20px;
    }

    .container{
        background:white;
        width:100%;
        max-width:600px;
        padding:30px;
        border-radius:15px;
        box-shadow:0 0 15px rgba(0,0,0,0.2);
    }

    h1{
        text-align:center;
        margin-bottom:20px;
        color:#333;
    }

    .campo{
        margin-bottom:15px;
    }

    label{
        display:block;
        margin-bottom:5px;
        font-weight:bold;
        color:#444;
    }

    input,
    select,
    textarea{
        width:100%;
        padding:10px;
        border:1px solid #ccc;
        border-radius:8px;
        transition:0.3s;
    }

    input:focus,
    select:focus,
    textarea:focus{
        outline:none;
        border-color:#007BFF;
        box-shadow:0 0 8px rgba(0,123,255,0.4);
    }

    .radio-group,
    .checkbox-group{
        display:flex;
        gap:15px;
        flex-wrap:wrap;
    }

    .radio-group label,
    .checkbox-group label{
        font-weight:normal;
    }

    .botoes{
        display:flex;
        gap:10px;
        justify-content:center;
        margin-top:20px;
    }

    button{
        padding:12px 25px;
        border:none;
        border-radius:8px;
        cursor:pointer;
        color:white;
        font-size:16px;
        transition:0.3s;
    }

    .enviar{
        background:#28a745;
    }

    .limpar{
        background:#dc3545;
    }

    button:hover{
        transform:scale(1.05);
        opacity:0.9;
    }

    @media (max-width:600px){
        .container{
            padding:20px;
        }

        .botoes{
            flex-direction:column;
        }

        button{
            width:100%;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>Formulário de Cadastro</h1>

    <form>

        <div class="campo">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" required>
        </div>

        <div class="campo">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="campo">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" required>
        </div>

        <div class="campo">
            <label for="data">Data de Nascimento</label>
            <input type="date" id="data" name="data">
        </div>

        <div class="campo">
            <label for="curso">Curso</label>
            <select id="curso" name="curso">
                <option>Selecione</option>
                <option>Análise e Desenvolvimento de Sistemas</option>
                <option>Engenharia de Software</option>
                <option>Ciência da Computação</option>
                <option>Sistemas de Informação</option>
            </select>
        </div>

        <div class="campo">
            <label>Sexo</label>
            <div class="radio-group">
                <label><input type="radio" name="sexo"> Masculino</label>
                <label><input type="radio" name="sexo"> Feminino</label>
                <label><input type="radio" name="sexo"> Outro</label>
            </div>
        </div>

        <div class="campo">
            <label>Interesses</label>
            <div class="checkbox-group">
                <label><input type="checkbox"> Tecnologia</label>
                <label><input type="checkbox"> Esportes</label>
                <label><input type="checkbox"> Música</label>
                <label><input type="checkbox"> Leitura</label>
            </div>
        </div>

        <div class="campo">
            <label for="comentarios">Comentários</label>
            <textarea id="comentarios" rows="4"></textarea>
        </div>

        <div class="campo">
            <label for="foto">Upload de Foto</label>
            <input type="file" id="foto">
        </div>

        <div class="botoes">
            <button type="submit" class="enviar">Enviar</button>
            <button type="reset" class="limpar">Limpar</button>
        </div>

    </form>
</div>

</body>
</html>
